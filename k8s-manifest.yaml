apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-companion-frontend
  labels:
    app: project-companion-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-companion-frontend
  template:
    metadata:
      labels:
        app: project-companion-frontend
    spec:
      containers:
      - name: project-companion-frontend
        image: project-companion-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: project-companion-frontend-service
spec:
  type: NodePort
  selector:
    app: project-companion-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
